apiVersion: v1
kind: Namespace
metadata:
  name: moodle
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: moodle-pvc
  namespace: moodle
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
  namespace: moodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: moodle
          image: ghcr.io/cybe-asia/digital-school-moodle:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /var/moodledata
              name: moodledata
            - mountPath: /var/www/html/config.php
              name: moodle-config
              subPath: config.php
            - mountPath: /etc/apache2/sites-available/000-default.conf
              name: apache-vhost
              subPath: 000-default.conf
      volumes:
        - name: moodledata
          persistentVolumeClaim:
            claimName: moodle-pvc
        - name: moodle-config
          configMap:
            name: moodle-config
        - name: apache-vhost
          configMap:
            name: moodle-apache-vhost
---
apiVersion: v1
kind: Service
metadata:
  name: moodle
  namespace: moodle
spec:
  selector:
    app: moodle
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: moodle-apache-vhost
  namespace: moodle
data:
  000-default.conf: |
    <VirtualHost *:80>
        ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html/public

        <Directory /var/www/html/public>
            Options FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
    </VirtualHost>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: moodle-config
  namespace: moodle
data:
  config.php: |
    <?php  // Moodle configuration file
    unset($CFG);
    global $CFG;
    $CFG = new stdClass();

    $CFG->dbtype    = 'mariadb';
    $CFG->dblibrary = 'native';
    $CFG->dbhost    = 'mariadb.moodle.svc.cluster.local';
    $CFG->dbname    = 'moodle';
    $CFG->dbuser    = 'moodle';
    $CFG->dbpass    = 'moodlepassword';
    $CFG->prefix    = 'mdl_';
    $CFG->dboptions = array (
      'dbpersist' => 0,
      'dbport' => '',
      'dbsocket' => '',
      'dbcollation' => 'utf8mb4_unicode_ci',
    );

    if (isset($_SERVER['HTTP_HOST'])) {
        $protocol = (isset($_SERVER['HTTPS']) && $_SERVER['HTTPS'] === 'on') ? "https" : "http";
        // Also respect HTTP_X_FORWARDED_PROTO if behind proxy/ingress
        if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $protocol = 'https';
        }
        $CFG->wwwroot = $protocol . '://' . $_SERVER['HTTP_HOST'];
    } else {
        $CFG->wwwroot = 'http://moodle.local';
    }
    
    $CFG->dataroot  = '/var/moodledata';
    $CFG->admin     = 'admin';
    $CFG->directorypermissions = 0777;

    require_once(__DIR__ . '/lib/setup.php');
