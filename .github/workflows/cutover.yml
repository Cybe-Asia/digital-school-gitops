name: cutover

# Manual blue/green cutover.
#
# Companion to auto-promote-prod.yml's `skip_cutover: true` mode. Use
# this when you've deployed a new image to the idle color (via the
# skip_cutover flag) and you've manually verified it. This workflow
# flips live routing to that idle color, then runs the same 5-minute
# soak + auto-rollback as the automated path.
#
# This workflow does NOT re-deploy. It assumes the idle color already
# has the image you want to go live — whatever was last promoted there.
#
# Manual trigger only (no automatic firing).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you cutting over? (audit trail — e.g. 'UAT passed for bulk-upload feature')"
        required: true
        type: string

concurrency:
  # Share the same group as auto-promote-prod so they never run at the
  # same time — they both mutate prod/routing/live-ingress.yaml.
  group: auto-promote-prod
  cancel-in-progress: false

jobs:
  cutover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Log trigger (audit)
        run: |
          {
            echo "## 🔀 Manual cutover triggered"
            echo ""
            echo "- Actor: **${{ github.actor }}**"
            echo "- Reason: **${{ github.event.inputs.reason }}**"
            echo "- Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}
          fetch-depth: 0

      - name: Git identity
        run: |
          git config user.email "ci-bot@cybe-asia.github"
          git config user.name "CI Bot"

      - name: Helper — get ArgoCD session token
        id: argo
        run: |
          token=$(curl -sk -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.ARGOCD_USERNAME }}\",\"password\":\"${{ secrets.ARGOCD_PASSWORD }}\"}" \
            "${{ secrets.ARGOCD_URL }}/api/v1/session" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::warning::Failed to get ArgoCD token; will use sleep-based waits"
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=true" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$token"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine live + idle colors
        id: color
        run: |
          live_ext=$(grep externalName prod/routing/live-ingress.yaml | head -1)
          if echo "$live_ext" | grep -q school-prod-blue; then
            echo "live=blue" >> "$GITHUB_OUTPUT"
            echo "idle=green" >> "$GITHUB_OUTPUT"
          else
            echo "live=green" >> "$GITHUB_OUTPUT"
            echo "idle=blue" >> "$GITHUB_OUTPUT"
          fi

      - name: Sanity — confirm idle is Healthy before flipping
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ steps.argo.outputs.token }}
          HAVE_TOKEN: ${{ steps.argo.outputs.have_token }}
        run: |
          idle="${{ steps.color.outputs.idle }}"
          if [ "$HAVE_TOKEN" = "true" ]; then
            status=$(curl -sk -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "$ARGOCD_URL/api/v1/applications/school-prod-${idle}-services" | \
              jq -r '"\(.status.sync.status)/\(.status.health.status)"')
            echo "school-prod-${idle}-services: $status"
            if [ "$status" != "Synced/Healthy" ]; then
              echo "::error::Idle color prod-${idle} is not Synced/Healthy ($status). Refusing to cut over to an unhealthy target. Fix the idle pods first, or re-run auto-promote-prod with skip_cutover=true to redeploy."
              exit 1
            fi
          else
            echo "::warning::No ArgoCD token — skipping Argo health gate (doing only smoke test)"
          fi

      - name: Sanity — smoke test idle URL
        run: |
          idle="${{ steps.color.outputs.idle }}"
          url="https://${idle}.school.cybe.tech:8443/"
          code=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "$url")
          echo "smoke: $url → HTTP $code"
          case "$code" in
            200|301|302|303) echo "OK" ;;
            *) echo "::error::Idle smoke failed ($code). Refusing to cut over."; exit 1 ;;
          esac

      - name: Flip routing (cutover)
        id: cutover
        run: |
          set -eu
          current_live="${{ steps.color.outputs.live }}"
          new_live="${{ steps.color.outputs.idle }}"
          echo "flipping live: school-prod-${current_live} → school-prod-${new_live}"
          sed -i "s|school-prod-${current_live}\.svc\.cluster\.local|school-prod-${new_live}.svc.cluster.local|g" prod/routing/live-ingress.yaml
          if git diff --quiet prod/routing/live-ingress.yaml; then
            echo "::error::routing file unchanged — live may already be on ${new_live}. Aborting."
            exit 1
          fi
          git add prod/routing/live-ingress.yaml
          git commit -m "manual-cutover: school.cybe.tech ${current_live} → ${new_live} — ${{ github.event.inputs.reason }} [skip promote] [skip ci]"
          cutover_sha=$(git rev-parse HEAD)
          git push origin main
          echo "cutover_sha=${cutover_sha}" >> "$GITHUB_OUTPUT"

      - name: Wait for Argo to sync routing
        run: sleep 45

      - name: Post-cutover soak (5 min)
        id: soak
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ steps.argo.outputs.token }}
          HAVE_TOKEN: ${{ steps.argo.outputs.have_token }}
        run: |
          set -u
          new_live="${{ steps.color.outputs.idle }}"
          live_url="https://school.cybe.tech:8443/"
          color_url="https://${new_live}.school.cybe.tech:8443/"

          http_failures=0
          argo_failures=0
          probes=20

          for i in $(seq 1 $probes); do
            live_code=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "$live_url" || echo "000")
            color_code=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "$color_url" || echo "000")

            live_ok="n"; color_ok="n"
            case "$live_code"  in 200|301|302|303) live_ok="y"  ;; esac
            case "$color_code" in 200|301|302|303) color_ok="y" ;; esac
            [ "$live_ok"  = "n" ] && http_failures=$((http_failures + 1))
            [ "$color_ok" = "n" ] && http_failures=$((http_failures + 1))

            argo_state="unknown"
            if [ "$HAVE_TOKEN" = "true" ]; then
              argo_state=$(curl -sk -H "Authorization: Bearer $ARGOCD_TOKEN" \
                "$ARGOCD_URL/api/v1/applications/school-prod-${new_live}-services" | \
                jq -r '"\(.status.sync.status)/\(.status.health.status)"')
              [ "$argo_state" != "Synced/Healthy" ] && argo_failures=$((argo_failures + 1))
            fi

            echo "probe $i/$probes  live=$live_code  ${new_live}=$color_code  argo=$argo_state  (fails http=$http_failures argo=$argo_failures)"
            sleep 15
          done

          if [ "$http_failures" -gt 3 ]; then
            echo "::error::$http_failures HTTP probe failures (>3 allowed)"
            exit 1
          fi
          if [ "$argo_failures" -gt 2 ]; then
            echo "::error::$argo_failures Argo state failures (>2 allowed)"
            exit 1
          fi
          echo "soak PASSED  http_failures=$http_failures  argo_failures=$argo_failures"

      - name: Auto-rollback (soak failed)
        if: failure() && steps.cutover.outcome == 'success' && steps.soak.outcome == 'failure'
        run: |
          set -e
          git config user.email "ci-bot@cybe-asia.github"
          git config user.name "CI Bot"
          git revert --no-edit ${{ steps.cutover.outputs.cutover_sha }}
          git push origin main
          echo "::warning::ROLLED BACK — live traffic returned to prod-${{ steps.color.outputs.live }}. Post-mortem on prod-${{ steps.color.outputs.idle }} (idle)."

      - name: Summary (success)
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Manual cutover complete

          **Live color now: prod-${{ steps.color.outputs.idle }}** (was prod-${{ steps.color.outputs.live }})

          - routing cutover ✅ (commit ${{ steps.cutover.outputs.cutover_sha }})
          - post-cutover soak ✅ (5 min)

          prod-${{ steps.color.outputs.live }} is now idle — standby for rollback.
          EOF

      - name: Summary (rolled back)
        if: steps.cutover.outcome == 'success' && steps.soak.outcome == 'failure'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ⚠️ Cutover rolled back

          Cutover to prod-${{ steps.color.outputs.idle }} succeeded but
          soak failed. Live traffic is back on **prod-${{ steps.color.outputs.live }}**.

          Investigate prod-${{ steps.color.outputs.idle }}:
          - Grafana: https://grafana.cybe.tech:8443/
          - ArgoCD: https://argo.cybe.tech:8443/applications/school-prod-${{ steps.color.outputs.idle }}-services
          EOF

      - name: Summary (halted before cutover)
        if: failure() && steps.cutover.outcome != 'success'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ⚠️ Cutover halted (pre-flight failure)

          Idle color prod-${{ steps.color.outputs.idle }} failed sanity checks (health or smoke).
          Live traffic remains on **prod-${{ steps.color.outputs.live }}** (unchanged).

          Check prod-${{ steps.color.outputs.idle }} pods in ArgoCD and Grafana before retrying.
          EOF
