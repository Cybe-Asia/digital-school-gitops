# Moodle LMS stack (admissions test engine + future student learning)
#
# This base deploys a Moodle instance with its own MariaDB 10.11 and
# Redis 7 inside the target environment's school-* namespace. Each
# overlay (lab/test, lab/dev, lab/staging, prod/blue, prod/green) adds:
#   - moodle-secret.yaml (sealed) holding MYSQL_* vars
#   - moodle-ingress.yaml with the per-env public hostname
#   - moodle-config.yaml patching config.php with the env-specific
#     wwwroot fallback (used when HTTP_HOST header is absent)
#
# Install is a one-time manual step after first deploy:
#   kubectl -n <ns> exec deploy/moodle -- \
#     php /var/www/html/admin/cli/install_database.php \
#     --agree-license --adminuser=admin --adminpass=... \
#     --adminemail=... --fullname=... --shortname=...
#
# See runbooks/moodle-first-deploy.md for details.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- mariadb.yaml
- redis.yaml
- moodle.yaml
# One-shot ArgoCD PostSync Job: writes TWSI site name to mdl_course
# and runs purge_all_caches() so the forced_plugin_settings theme
# SCSS (loaded from config/config.php) actually compiles and serves.
- brand-init.yaml

# Generate the three Moodle ConfigMaps from files under config/.
# Kustomize appends a content-hash suffix to each ConfigMap name
# (e.g. moodle-config-a1b2c3d) and rewrites every reference in the
# Deployment + brand-init Job to match. Any byte-level change in
# config.php / 000-default.conf / zz-moodle.ini therefore produces
# a fresh ConfigMap name, which triggers Kubernetes to see a
# Deployment template diff and roll the pod automatically. No
# `kubectl rollout restart` needed.
configMapGenerator:
- name: moodle-config
  files:
    - config.php=config/config.php
- name: moodle-apache-vhost
  files:
    - 000-default.conf=config/000-default.conf
- name: moodle-php-ini
  files:
    - zz-moodle.ini=config/zz-moodle.ini

labels:
- pairs:
    app.kubernetes.io/part-of: moodle
