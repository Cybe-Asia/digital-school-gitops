apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillz-staging-services
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: skillz
    environment: staging
spec:
  project: skillz
  source:
    repoURL: https://github.com/Cybe-Asia/digital-school-moodle-gitops.git
    targetRevision: main
    path: skillz-staging
  destination:
    server: https://kubernetes.default.svc
    namespace: skillz-staging
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
