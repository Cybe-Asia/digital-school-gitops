apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moodle
  namespace: skillz-dev
spec:
  rules:
  - host: skillz-dev.local
    http:
      paths:
      - backend:
          service:
            name: moodle
            port:
              number: 80
        path: /
        pathType: Prefix
