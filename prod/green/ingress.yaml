# Color-specific hostname for green. See prod/blue/ingress.yaml for
# rationale. prod/routing/live-ingress.yaml owns the live hostname.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-prod-green-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - green.school.cybe.tech
      secretName: school-prod-green-tls
  rules:
    - host: green.school.cybe.tech
      http:
        paths:
          - path: /api/v1/auth-service
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/googleLogin
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/admission-service
            pathType: Prefix
            backend:
              service:
                name: admission-service
                port:
                  number: 80
          # SIS routes — must come before /api/leads/v1 catch-all so
          # longest-prefix matching reaches sis-service first.
          - path: /api/v1/sis-service
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/admin/sis
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/me/grades
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/me/attendance
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/me/sections
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1
            pathType: Prefix
            backend:
              service:
                name: admission-service
                port:
                  number: 80
          - path: /api/v1/otp-service
            pathType: Prefix
            backend:
              service:
                name: otp-service
                port:
                  number: 80
          - path: /api/email/v1
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
