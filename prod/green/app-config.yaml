apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NEO4J_URI: "neo4j://neo4j.school-prod-green.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  GOOGLE_TOKENINFO_ENDPOINT: "https://oauth2.googleapis.com/tokeninfo"
  EMAIL_FROM: "no-reply@school.cybe.tech"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_USER: "apikey"
  # Object storage for admissions DocumentArtifact bytes. See
  # prod/blue/app-config.yaml for full notes. Same bucket name in both
  # colors — separate underlying StatefulSet means no shared data.
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "ds-documents"
  MINIO_REGION: "us-east-1"
