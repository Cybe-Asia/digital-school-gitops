apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NEO4J_URI: "neo4j://neo4j.school-prod-blue.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  GOOGLE_TOKENINFO_ENDPOINT: "https://oauth2.googleapis.com/tokeninfo"
  EMAIL_FROM: "no-reply@school.cybe.tech"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_USER: "apikey"
  # Object storage for admissions DocumentArtifact bytes. Same shape
  # as lab/test — in-cluster MinIO StatefulSet, scoped service-account
  # creds carried in app-secrets (MINIO_ACCESS_KEY/MINIO_SECRET_KEY).
  # Bucket name matches base/minio/init-job.yaml which hardcodes
  # `ds-documents`. Each color has its own MinIO StatefulSet so the
  # same bucket name in blue + green points at separate underlying
  # storage — no cross-color data leak.
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "ds-documents"
  MINIO_REGION: "us-east-1"
