# GHCR pull secret placeholder — you must populate this with valid
# docker-registry credentials before the first sync. Copy the existing
# ghcr-secret from skillz-dev:
#   kubectl get secret ghcr-secret -n skillz-dev -o yaml | \
#     sed 's/namespace: skillz-dev/namespace: skillz-prod-green/' | \
#     kubectl apply -f -
#
# Or create it manually:
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace=skillz-prod-green \
#     --docker-server=ghcr.io \
#     --docker-username=<USERNAME> \
#     --docker-password=<GHCR_PAT>
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: skillz-prod-green
